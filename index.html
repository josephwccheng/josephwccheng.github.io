<!DOCTYPE html>
<html lang="en">

<head>
  <title>Hawk Solutions</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="css/index.css" rel="stylesheet">
  <script src="http://code.jquery.com/jquery-2.1.4.min.js"></script>
  <script>
    $(function(){
      $("#header").load("header.html", function(){
        alert("header populated");
      }); 
      $("#footer").load("footer.html"); 
    });
  </script>
</head>

<body>
  <div class="container-fluid p-0">
  <div id="header"></div>
    <div class="content">
      <div class="container-fluid p-5 anchor">
        <h3>Past Projects</h3>
        <div class="row gallery">
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/Bricklane bar/IMG_2885.JPG">
            <p>Bricklane Bar</p>
          </div>
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/flow gym/IMG_5397.JPG">
            <p>Flow Gym</p>
          </div>
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/ivory room/IMG_9749.JPG">
            <p>Ivory Room</p>
          </div>
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/sea deck/IMG_3596.JPG">
            <p>Sea Deck</p>
          </div>
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/residential/IMG_6340.JPG">
            <p>Residential</p>
          </div>
          <div class="col-12 col-sm-2">
            <img class="w-100" src="images/wiring/IMG_7297.JPG">
            <p>Wiring</p>
          </div>
        </div>
        <a href="services.html"> <button class="services">View Services</button></a>
      </div>
    </div>
  </div>
  <div id="footer"></div>
 
  <script>
    const navLinks = document.querySelectorAll('.nav-item')
    const menuToggle = document.getElementById('navbarSupportedContent')
    const bsCollapse = new bootstrap.Collapse(menuToggle, {
      toggle: false
    })
    navLinks.forEach((l) => {
      l.addEventListener('click', () => {
        bsCollapse.toggle()
      })
    })
  </script>
</body>

</html>
